name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check part_io tests

      - name: Type check
        run: poetry run ty check

      - name: Tests
        run: poetry run pytest -q

      - name: Semgrep
        run: poetry run semgrep scan --config config/semgrep part_io tests --error

      - name: CPD
        run: poetry run npx --yes jscpd@4.0.5 --config config/jscpd.json


