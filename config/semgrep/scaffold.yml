rules:
  - id: part_io-root-scaffold-only
    message: >-
      Only these top-level packages are allowed directly under part_io/: adapters, cli,
      models, services, utils. Move this module or update the scaffold policy.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /part_io/**/*.py
      exclude:
        - /part_io/adapters/**/*.py
        - /part_io/cli/**/*.py
        - /part_io/models/**/*.py
        - /part_io/services/**/*.py
        - /part_io/utils/**/*.py
        - /part_io/__init__.py
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)

  - id: part_io-adapters-shape
    message: >-
      Keep part_io.adapters limited to the current stable shape: config, lint,
      process, reporting, audio, errors.py, and package init files.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /part_io/adapters/**/*.py
      exclude:
        - /part_io/adapters/__init__.py
        - /part_io/adapters/errors.py
        - /part_io/adapters/audio/**/*.py
        - /part_io/adapters/config/**/*.py
        - /part_io/adapters/lint/**/*.py
        - /part_io/adapters/process/**/*.py
        - /part_io/adapters/reporting/**/*.py
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)

  - id: tests-unit-mirror-part_io-top-level-shape
    message: >-
      Keep tests/unit aligned with part_io top-level layers only: adapters, cli,
      models, services, utils, and the audio adapter test slice. Add a new
      part_io layer first, then mirror it in tests/unit deliberately.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/unit/**/*.py
        - "**/tests/unit/**/*.py"
      exclude:
        - /tests/unit/adapters/**/*.py
        - "**/tests/unit/adapters/**/*.py"
        - /tests/unit/audio/**/*.py
        - "**/tests/unit/audio/**/*.py"
        - /tests/unit/cli/**/*.py
        - "**/tests/unit/cli/**/*.py"
        - /tests/unit/models/**/*.py
        - "**/tests/unit/models/**/*.py"
        - /tests/unit/services/**/*.py
        - "**/tests/unit/services/**/*.py"
        - /tests/unit/utils/**/*.py
        - "**/tests/unit/utils/**/*.py"
    pattern-regex: ^\s*(from|import|def|class|@|[A-Za-z_][\w]*\s*=)
