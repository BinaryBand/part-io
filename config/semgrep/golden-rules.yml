rules:
  - id: no-print-in-models
    message: >-
      Models must not write to stdout. Use logging module or return data for
      entrypoints to display. Models stay pure, testable, and independent.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "/part_io/models/**/*.py"
    pattern: print(...)

  - id: no-print-in-services
    message: >-
      Services must not write to stdout. Use logging module or return data for
      entrypoints to display. Services stay pure and composable.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "/part_io/services/**/*.py"
    pattern: print(...)

  - id: no-subprocess-in-models
    message: >-
      Models must not execute external processes directly. Delegate to adapters
      or CLI entrypoints.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/part_io/models/**/*.py"
    pattern-either:
      - pattern: subprocess.run(...)
      - pattern: subprocess.Popen(...)
      - pattern: subprocess.call(...)
      - pattern: subprocess.check_call(...)
      - pattern: subprocess.check_output(...)

  - id: no-subprocess-in-services
    message: >-
      Services must not execute external processes directly. Delegate to adapters.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "/part_io/services/**/*.py"
    pattern-either:
      - pattern: subprocess.run(...)
      - pattern: subprocess.Popen(...)
      - pattern: subprocess.call(...)
      - pattern: subprocess.check_call(...)
      - pattern: subprocess.check_output(...)

  - id: no-file-io-in-models
    message: >-
      Models must not perform filesystem I/O. Use pathlib.Path or file helpers
      only in adapters. Models stay pure and testable.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "/part_io/models/**/*.py"
    pattern-either:
      - pattern: open(...)
      - pattern: $X.read_text(...)
      - pattern: $X.write_text(...)
      - pattern: $X.mkdir(...)
      - pattern: $X.unlink(...)

  - id: no-file-io-in-services
    message: >-
      Services must not perform filesystem I/O. Delegate to adapters.
      Services stay pure and composable.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "/part_io/services/**/*.py"
    pattern-either:
      - pattern: open(...)
      - pattern: $X.read_text(...)
      - pattern: $X.write_text(...)
      - pattern: $X.mkdir(...)
      - pattern: $X.unlink(...)

  - id: no-print-in-adapters-without-logging
    message: >-
      Adapters should use logging module for errors, not bare print().
      Print is for CLI entrypoints only.
    severity: WARNING
    languages: [python]
    paths:
      include:
        - "/part_io/adapters/**/*.py"
    pattern: print(...)


