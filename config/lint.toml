[lizard]
ccn = 15
length = 60
warnings_only = true
paths = ["part_io"]

[vulture]
min_confidence = 80
paths = ["part_io", "tests"]

[coverage]
floor = 80

[ruff]
mode = "check"
line_length = 100
select = "E,W,F"
ignore = "E501"
paths = ["part_io", "tests"]

[markdownlint]
paths = ["docs/", "*.md"]

[ansible_coverage]
floor = 20

[ansible_roles_coverage]
floor = 100


